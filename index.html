<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>To-Do List</h1>
        <p class="task-counter" id="task-counter">0 tasks &middot; 0 completed</p>
      </header>

      <section class="input-section" aria-label="Add a new task">
        <form id="task-form" novalidate>
          <input
            type="text"
            id="task-input"
            class="task-input"
            placeholder="What needs to be done?"
            aria-label="New task"
            maxlength="200"
            autocomplete="off"
          />
          <button type="submit" class="btn btn-add" aria-label="Add task">Add</button>
        </form>
        <p class="validation-msg" id="validation-msg" role="alert" aria-live="polite"></p>
      </section>

      <section class="list-section" aria-label="Task list">
        <ul id="task-list" class="task-list"></ul>
      </section>

      <footer class="app-footer">
        <button class="btn btn-clear" id="clear-completed-btn">Clear Completed</button>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
